<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-label="Monitoring Microservices Lab banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#123a5a"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f2b44"/>
      <stop offset="100%" stop-color="#243b55"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="420" fill="url(#bg)"/>

  <circle cx="1040" cy="80" r="160" fill="#2ec4b6" opacity="0.12"/>
  <circle cx="200" cy="360" r="140" fill="#ffbf69" opacity="0.1"/>

  <rect x="70" y="70" width="1060" height="280" rx="18" fill="url(#card)" stroke="#3d5a80" stroke-width="2"/>

  <text x="110" y="155" fill="#f8f9fa" font-family="Segoe UI, Arial, sans-serif" font-size="54" font-weight="700">
    Monitoring Microservices Lab
  </text>
  <text x="110" y="205" fill="#cbd5e1" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="500">
    Prometheus + Alertmanager + Eureka + Telegram
  </text>

  <g transform="translate(110 245)">
    <rect x="0" y="0" width="170" height="58" rx="10" fill="#0f172a" stroke="#2ec4b6"/>
    <text x="85" y="37" text-anchor="middle" fill="#2ec4b6" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">Prometheus</text>

    <rect x="190" y="0" width="190" height="58" rx="10" fill="#0f172a" stroke="#ffd166"/>
    <text x="285" y="37" text-anchor="middle" fill="#ffd166" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">Alertmanager</text>

    <rect x="400" y="0" width="130" height="58" rx="10" fill="#0f172a" stroke="#90caf9"/>
    <text x="465" y="37" text-anchor="middle" fill="#90caf9" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">Eureka</text>

    <rect x="550" y="0" width="160" height="58" rx="10" fill="#0f172a" stroke="#ff9f1c"/>
    <text x="630" y="37" text-anchor="middle" fill="#ff9f1c" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">Telegram</text>
  </g>
</svg>
